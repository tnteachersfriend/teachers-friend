<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>குழந்தை மேம்பாடு Quiz Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2743214359550502"
     crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); min-height: 100vh; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #4a148c; text-shadow: 1px 1px 2px #fff; text-align: center; }
        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; width: 100%; max-width: 800px; margin-top: 20px; }
        .quiz-btn { background: #fff; border: 2px solid #6a1b9a; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; color: #4a148c; cursor: pointer; transition: 0.3s; text-align: center; text-decoration: none; }
        .quiz-btn:hover { background: #6a1b9a; color: #fff; }
        .score-badge { display: block; font-size: 12px; color: #27ae60; margin-top: 5px; }
        .back-btn { margin-top: 30px; padding: 10px 30px; background: #c0392b; color: white; border: none; border-radius: 20px; font-size: 18px; cursor: pointer; text-decoration: none; }
        .login-prompt { margin-top: auto; padding: 20px; font-size: 16px; font-weight: bold; }
        .login-prompt a { color: #000; text-decoration: underline; }
    </style>
</head>
<body>
    <h1>குழந்தை மேம்பாடு - மாதிரித் தேர்வுகள்</h1>
    
    <div class="quiz-grid" id="quizGrid"></div>

    <a href="tet_quiz.html" class="back-btn">Back</a>
    
    <div class="login-prompt">
        <a href="index.html">To download old TNTET Question Please Login</a>
    </div>

  <script>
    const grid = document.getElementById('quizGrid');
    let cdpScores = JSON.parse(localStorage.getItem('cdp_scores') || '{}');

    for(let i = 1; i <= 25; i++) {
        let scoreText = cdpScores['quiz'+i] !== undefined ? `<span class="score-badge">மதிப்பெண்: ${cdpScores['quiz'+i]}/30</span>` : '';
        // இங்கே cdp_quiz_X.html என்பதற்கு பதிலாக, பொதுவான quiz_play.html-க்கு லிங்க் செய்யப்படுகிறது
        grid.innerHTML += `<a href="quiz_play.html?subject=cdp&id=${i}" class="quiz-btn">Quiz ${i} ${scoreText}</a>`;
    }
</script>
</body>
</html>
