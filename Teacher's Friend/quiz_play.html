<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>Quiz Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2743214359550502"
     crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #e0f7fa; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h2 { color: #006064; margin-bottom: 10px; }
        
        /* Top Navigation Boxes */
        .q-nav-container { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-width: 800px; margin-bottom: 20px; }
        .q-box { width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; background: #fff; border: 2px solid #b2ebf2; border-radius: 5px; cursor: pointer; font-weight: bold; color: #333; }
        .q-box.answered { background: #29b6f6; color: white; border-color: #039be5; } 
        .q-box.active-box { border: 3px solid #ff9800; transform: scale(1.1); }
        
        /* Result Colors */
        .q-box.correct { background: #4caf50; color: white; border-color: #2e7d32; }
        .q-box.wrong { background: #f44336; color: white; border-color: #c62828; }

        /* Quiz Container */
        .quiz-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        .question-text { font-size: 22px; margin-bottom: 20px; color: #111; line-height: 1.5; }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 15px; background: #f5f5f5; border: 2px solid #ddd; border-radius: 8px; text-align: left; font-size: 18px; cursor: pointer; transition: 0.2s; font-weight: 600; line-height: 1.4; }
        .option-btn:hover { background: #e3f2fd; border-color: #2196f3; }
        .option-btn.selected { background: #2196f3; color: white; border-color: #1976d2; }
        
        /* Result UI Details */
        .option-btn.correct-ans { background: #4caf50 !important; color: white; border-color: #2e7d32; }
        .option-btn.wrong-ans { background: #f44336 !important; color: white; border-color: #c62828; }

        .btn-group { display: flex; justify-content: space-between; margin-top: 25px; }
        .action-btn { padding: 10px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .prev-btn { background: #757575; }
        .next-btn { background: #ff9800; }
        .result-btn { background: #9c27b0; display: none; width: 100%; margin-top: 15px; padding: 15px; font-size: 20px; }
        
        .result-summary { display: none; text-align: center; }
        .final-score { font-size: 30px; color: #e91e63; font-weight: 800; margin-bottom: 20px; }

        .back-btn { margin-top: 20px; padding: 10px 30px; background: #c0392b; color: white; border: none; border-radius: 20px; font-size: 18px; cursor: pointer; text-decoration: none; display: inline-block;}
        .login-prompt { margin-top: auto; padding: 20px; font-size: 16px; font-weight: bold; }
        .login-prompt a { color: #000; text-decoration: underline; }
    </style>
</head>
<body>

    <h2 id="quizTitle">Quiz</h2>
    
    <div class="q-nav-container" id="navBoxes"></div>

    <div class="quiz-container" id="quizArea">
        <div class="question-text" id="questionText">கேள்வி ஏற்றப்படுகிறது...</div>
        <div class="options-container" id="optionsBox"></div>
        
        <div class="btn-group">
            <button class="action-btn prev-btn" onclick="prevQuestion()">முந்தைய வினா</button>
            <button class="action-btn next-btn" onclick="nextQuestion()">அடுத்த வினா</button>
        </div>
        <button class="action-btn result-btn" id="showResultBtn" onclick="showResults()">முடிவுகளைக் காண்</button>
    </div>

    <div class="quiz-container result-summary" id="resultArea">
        <div class="final-score" id="scoreDisplay"></div>
        <p>மேலே உள்ள பாக்ஸ்களைக் கிளிக் செய்து சரியான/தவறான விடைகளைச் சரிபார்க்கவும்.</p>
    </div>

    <a href="tet_quiz.html" id="backBtn" class="back-btn">Back to Quizzes</a>
    
    <div class="login-prompt">
        <a href="index.html">To download old TNTET Question Please Login</a>
    </div>

        <script>
        // URL-ல் இருந்து பாடம் (Subject) மற்றும் Quiz ID எடுப்பது
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject') || 'cdp';
        const quizId = urlParams.get('id') || '1'; // Default ஆக Quiz 1 என அமைக்கப்பட்டுள்ளது

        // பாடத்தின் பெயரைத் தமிழில் மாற்றுதல்
        let subjectName = "தமிழ்";
        if(subject === 'cdp') subjectName = "குழந்தை மேம்பாடு";
        else if(subject === 'english') subjectName = "ஆங்கிலம்";
        else if(subject === 'math') subjectName = "கணக்கு";
        else if(subject === 'science') subjectName = "அறிவியல்";
        else if(subject === 'social') subjectName = "சமூக அறிவியல்";

        document.getElementById('quizTitle').innerText = `${subjectName} - மாதிரித் தேர்வு ${quizId}`;
        document.getElementById('backBtn').href = `tet_${subject}.html`; 

        let questions = [];

        // வினாக்களின் வரிசையை ஒவ்வொரு முறையும் மாற்றி அமைப்பதற்கான (Shuffle) Function
        function shuffleQuestions(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]]; // வரிசையை இடமாற்றம் செய்தல்
            }
        }

        // --- வினாத் தொகுப்புகள் (Question Banks) ---

        // குழந்தை மேம்பாடு Quiz 1
        const cdpQuiz1 = [
            { q: "சிசுப் பருவம் என்பது", options: ["1 - 3 ஆண்டுகள்", "3 - 6 ஆண்டுகள்", "0 - 1 ஆண்டுகள்", "6 - 10 ஆண்டுகள்"], answer: 2 },
            { q: "3 - 6 ஆண்டுகளை ............... என்கிறோம்.", options: ["வாலிபப் பருவம்", "குமரப் பருவம்", "பள்ளிப் பருவம்", "பள்ளி முன் பருவம்"], answer: 3 },
            { q: "............... என்பது மனித உடலில் உள்ள செல்கள் திசுக்களின் பெருக்கத்தால் ஏற்படும் உயரம் மற்றும் எடை பெருக்கத்தைக் குறிக்கிறது.", options: ["உடல் வளர்ச்சி", "மன வளர்ச்சி", "ஒழுக்க வளர்ச்சி", "சமூக வளர்ச்சி"], answer: 0 },
            { q: "மனித உடலின் வளர்ச்சி மற்றும் முதிர்ச்சி ஆகியவற்றின் அடிப்படையில் மனிதனின் வளர்ச்சி பின்வரும் எத்தனை பருவங்களாக பிரிக்கின்றோம்?", options: ["7", "6", "8", "3"], answer: 2 },
            { q: "குறுநடைப் பருவம் என்பது", options: ["1 - 3 ஆண்டுகள்", "3 - 6 ஆண்டுகள்", "6 - 10 ஆண்டுகள்", "0 - 1 ஆண்டுகள்"], answer: 0 },
            { q: "குழந்தைகள் 6 - 10 ஆண்டுகளில் ............... பள்ளிகளில் கல்வி கற்கின்றனர்.", options: ["உயர்நிலைப் பள்ளிகளில்", "நடுநிலைப் பள்ளிகளில்", "தொடக்கப் பள்ளிகளில்", "மேல்நிலைப் பள்ளிகளில்"], answer: 2 },
            { q: "பிறந்த குழந்தை", options: ["சராசரியாக 50 செ.மீ உயரமும் 3 கி.கி எடையும் இருக்கும்", "சராசரியாக 60 செ.மீ உயரமும் 4 கி.கி எடையும் இருக்கும்", "சராசரியாக 40 செ.மீ உயரமும் 2 கி.கி எடையும் இருக்கும்", "மேற்கண்ட ஏதுமில்லை"], answer: 0 },
            { q: "பள்ளிப் பருவம் என்பது", options: ["10 - 20 ஆண்டுகள்", "6 - 10 ஆண்டுகள்", "20 - 40 ஆண்டுகள்", "3 - 6 ஆண்டுகள்"], answer: 1 },
            { q: "உடல் வளர்ச்சியில் ............... முக்கியக் காரணிகளாகும்.", options: ["உடல் உறுப்பு, தசை வளர்ச்சியும்", "எலும்பு, தசை வளர்ச்சி", "நரம்பு, எலும்பு வளர்ச்சி", "உடல் உறுப்பு, நரம்பு வளர்ச்சி"], answer: 1 },
            { q: "பின்வருவனவற்றுள் எந்த ஒன்று தவறு.", options: ["குமரப்பருவம் 10 - 20 ஆண்டுகள்", "வாலிபப் பருவம் 20 - 40 ஆண்டுகள்", "முதுமைப் பருவம் 60 ஆண்டுகளுக்கு மேல்", "குறுநடைப் பருவம் 1 - 3 ஆண்டுகள்"], answer: 3 },
            { q: "நடுவண் அரசும், மாநில அரசும் ............... ஆண்டுகள் வரை உள்ள அனைத்து குழந்தைகளுக்கும் கட்டாய இலவசக் கல்வி அளிக்க வேண்டும் என்று செயல்பட்டு வருகின்றன.", options: ["17 வயது", "14 வயது", "16 வயது", "15 வயது"], answer: 1 },
            { q: "வாலிபப் பருவத்திற்கும் முதுமைப் பருவத்திற்கும் இடைப்பட்ட பருவம்", options: ["20 - 40 ஆண்டுகள்", "40 - 60 ஆண்டுகள்", "6 - 10 ஆண்டுகள்", "3 - 6 ஆண்டுகள்"], answer: 1 },
            { q: "தொடக்கப் பள்ளிகளில் கல்வி கற்பதை ............... என்கிறோம்.", options: ["குழந்தைப் பருவம்", "பள்ளிப் பருவம்", "குமரப் பருவம்", "சிசுப் பருவம்"], answer: 1 },
            { q: "குழந்தைகள் முன் மழலையர் பள்ளிகளில் கல்வி கற்பது", options: ["3 - 6 ஆண்டுகள்", "1 - 3 ஆண்டுகள்", "1 - 2 ஆண்டுகள்", "0 - 1 ஆண்டுகள்"], answer: 0 },
            { q: "பள்ளிப் பருவத்தில் கூர்மையாக்கப்படும் உடலியக்கங்கள்", options: ["உணவு உண்ணுதல், பேசுதல்", "பல் துலக்குதல், ஆடை அணிதல்", "பென்சிலை பிடித்து எழுதுதல், பந்து விளையாடுதல்", "மேற்கண்ட அனைத்தும்"], answer: 3 },
            { q: "உடல் வளர்ச்சியை பாதிக்கும் அடிப்படைக் காரணிகள்", options: ["தனி மனித உடலின் கட்டமைப்பு", "உட்பண்புகள் மற்றும் உடலின் கட்டமைப்பு", "சுற்றுப்புறச் சூழ்நிலை, மரபு பண்பு", "மேற்கண்ட அனைத்தும்"], answer: 0 },
            { q: "தொடக்கக் கல்வி பயில பள்ளிக்கு வரும் குழந்தையின் ............... 90 சதவீத வளர்ச்சி அடைந்து வருகிறது.", options: ["இனப்பெருக்க மண்டலம்", "எலும்பு மண்டலம்", "நரம்பு மண்டலம்", "தசைநார்"], answer: 2 },
            { q: "குழந்தைகளின் வளர்ச்சி என்பது அவர்கள் வளரும் ............... பின்னணியை பொறுத்து வேறுபடுகின்றது.", options: ["சமூக, பொருளாதார", "கல்வி, பண்பாட்டு", "மரபு, பொருளாதாராம்", "சமூக, சூழ்நிலை"], answer: 0 },
            { q: "குழந்தையின் உடல் வளர்ச்சி தேக்க நிலையை அடைவது", options: ["சிசுப் பருவம் முதல் குறுநடைப் பருவம் வரை", "பள்ளிப் பருவம் முதல் குமரப் பருவம் தொடங்கும் வரை", "வாலிபப் பருவம் முதல் குமரப் பருவம் தொடங்கும் வரை", "அனைத்து பருவங்களிலும்"], answer: 1 },
            { q: "தொடக்கக் கல்வி கற்க பள்ளிக்கு வரும் குழந்தை அடையப் பெற்றிருக்கும் உடலியக்கங்கள்", options: ["உணவு உண்ணுதல், பேசுதல்", "பல் துலக்குதல், ஆடை அணிதல்", "பென்சிலை பிடித்து எழுதுதல், பந்து விளையாடுதல்", "மேற்கண்ட அனைத்தும்"], answer: 3 },
            { q: "உடல் வளர்ச்சியின் போது குழந்தைகளின் ............... வளர்ச்சி அடைின்றன.", options: ["ஒழுக்க உணர்வும்", "இயக்கங்களும்", "மனவெழுச்சியும்", "மேற்கண்ட அனைத்தும்"], answer: 1 },
            { q: "கார்போஹைட்ரேட், புரோட்டீன் ஆகியவற்றின் வளர்ச்சிதை மாற்றத்தை ஒழுங்குபடுத்துவது", options: ["அட்ரினலின்", "தைராக்சின்", "இன்சுலின்", "பாரா தைராய்டு"], answer: 0 },
            { q: "இரத்தத்தில் உள்ள கால்சியம் மற்றும் பாஸ்பரஸின் அளவைக் கட்டுப்படுத்துவது", options: ["தைராக்சின்", "அட்ரினலின்", "பிட்யூட்டரி", "பாரா தைராய்டு"], answer: 3 },
            { q: "மனித உடலின் செயல்பாடுகளை ஒழுங்குபடுத்தும் மிக முக்கியமான இரு பெரும் அமைப்பு", options: ["இனப்பெருக்க மண்டலமும் நரம்பு மண்டலமும்", "நாளமில்லா சுரப்பி மண்டலமும் நரம்பு மண்டலமும்", "உணவு மண்டலமும் இனப்பெருக்க மண்டலமும்", "இயக்க மண்டலமும் நரம்பு மண்டலமும்"], answer: 1 },
            { q: "ஆக்சிஜன் உட்கிரகித்தலை அதிகப்படுத்துவதுடன் வளர்சிதை மாற்றச் செயலைக் கட்டுப்படுத்துவது", options: ["தைராக்சின்", "அட்ரினலின்", "பிட்யூட்டரி", "பாரா தைராய்டு"], answer: 0 },

        // --- UI மற்றும் வினா இயக்கம் தொடர்பான குறியீடுகள் ---
        let currentQ = 0;
        let userAnswers = new Array(30).fill(null);
        let isResultMode = false;

        const navBoxes = document.getElementById('navBoxes');
        const qText = document.getElementById('questionText');
        const optionsBox = document.getElementById('optionsBox');
        const showResultBtn = document.getElementById('showResultBtn');

        function initNavBoxes() {
            navBoxes.innerHTML = '';
            for(let i = 0; i < 30; i++) {
                let box = document.createElement('div');
                box.className = 'q-box';
                box.innerText = i + 1;
                box.onclick = () => goToQuestion(i);
                box.id = `box-${i}`;
                navBoxes.appendChild(box);
            }
        }

        function loadQuestion(index) {
            currentQ = index;
            let qData = questions[index];
            qText.innerText = `${index + 1}. ${qData.q}`;
            optionsBox.innerHTML = '';

            document.querySelectorAll('.q-box').forEach(b => b.classList.remove('active-box'));
            document.getElementById(`box-${index}`).classList.add('active-box');

            qData.options.forEach((opt, i) => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                
                if (isResultMode) {
                    btn.disabled = true;
                    if (i === qData.answer) btn.classList.add('correct-ans');
                    if (userAnswers[index] === i && userAnswers[index] !== qData.answer) btn.classList.add('wrong-ans');
                } else {
                    if (userAnswers[index] === i) btn.classList.add('selected');
                    btn.onclick = () => selectOption(i);
                }
                optionsBox.appendChild(btn);
            });
            checkAllAnswered();
        }

        function selectOption(optIndex) {
            userAnswers[currentQ] = optIndex;
            document.getElementById(`box-${currentQ}`).classList.add('answered');
            
            setTimeout(() => {
                if (currentQ < 29) {
                    nextQuestion();
                } else {
                    loadQuestion(currentQ);
                }
            }, 300);
        }

        function prevQuestion() { if(currentQ > 0) loadQuestion(currentQ - 1); }
        function nextQuestion() { if(currentQ < 29) loadQuestion(currentQ + 1); }
        function goToQuestion(index) { loadQuestion(index); }

        function checkAllAnswered() {
            if(!isResultMode) {
                let answeredCount = userAnswers.filter(a => a !== null).length;
                if(answeredCount === 30) {
                    showResultBtn.style.display = 'block';
                }
            }
        }

        function showResults() {
            isResultMode = true;
            let score = 0;
            
            for(let i = 0; i < 30; i++) {
                let box = document.getElementById(`box-${i}`);
                box.classList.remove('answered', 'active-box');
                
                if(userAnswers[i] === questions[i].answer) {
                    box.classList.add('correct');
                    score++;
                } else {
                    box.classList.add('wrong');
                }
            }

            document.getElementById('quizArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('scoreDisplay').innerText = `மதிப்பெண்: ${score} / 30`;

            // அந்தந்த பாடத்திற்கான Key-ல் LocalStorage சேமிப்பு
            let storageKey = `${subject}_scores`;
            let scores = JSON.parse(localStorage.getItem(storageKey) || '{}');
            scores['quiz'+quizId] = score;
            localStorage.setItem(storageKey, JSON.stringify(scores));

            document.getElementById('quizArea').style.display = 'block';
            document.querySelector('.btn-group').style.display = 'flex';
            showResultBtn.style.display = 'none';
            loadQuestion(0);
        }

        initNavBoxes();
