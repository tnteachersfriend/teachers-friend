/* --- 3. Custom Dynamic Colleagues Widget Styles & Top Row Layout --- */
.main-widgets-wrapper {
    max-width: 600px;
    margin: 0 auto 5px auto;
    padding: 0 12px;
}

/* --- 3. Custom Dynamic Colleagues Widget Styles & Layout --- */
.main-widgets-wrapper {
    max-width: 600px;
    margin: 0 auto 5px auto;

}

/* Clip & Video கார்டுகளுக்கான ஸ்டைல் */
.moment-card {
    width: 115px; 
    height: 170px; 
    border-radius: 14px; 
    flex-shrink: 0;
    position: relative; 
    background-size: cover; 
    background-position: center;

}
.moment-badge { position: absolute; top: 10px; left: 10px; width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; background: #8a2be2; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }
/* --- Dynamic Top Clip Video Styles --- */
.moment-card {
    width: 115px; 
    height: 170px; 
    border-radius: 14px; 
    flex-shrink: 0;
    position: relative; 
    background: #333; /* வீடியோ லோட் ஆகும் முன் தெரியும் நிறம் */

    transition: transform 0.2s;
    cursor: pointer;
}

.top-clip-media {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

.moment-overlay {
    position: absolute;
    top: 0;

}

/* --- Feed / Posts --- */
.feed-container { padding: 5px 12px; max-width: 600px; margin: 0 auto; }
.post-card { background: #ffffff; margin-bottom: 15px; border-radius: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }

.side-menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.4); z-index: 2000; }

<script>
// --- 1. Firebase Initial Configuration ---
const firebaseConfig = {
    apiKey: "AIzaSyClc8ZHOMPQIvRCJpmsF5mFPXM-7o1mYek",
    authDomain: "teacher-s-friend-3aca8.firebaseapp.com",
    projectId: "teacher-s-friend-3aca8",
    storageBucket: "teacher-s-friend-3aca8.firebasestorage.app",
    messagingSenderId: "294698361211",
    appId: "1:294698361211:web:1e2322906d536a4d3e1dde",
    databaseURL: "https://teacher-s-friend-3aca8-default-rtdb.firebaseio.com"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();
const storage = firebase.storage();

// --- 2. Core States & Identifiers ---
let currentUserId = localStorage.getItem('teacherApp_userId');
if (!currentUserId) {
    currentUserId = 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('teacherApp_userId', currentUserId);
}

let currentUserName = localStorage.getItem('teacherApp_userName') || "ஆசிரியர்"; 
let currentProfilePic = localStorage.getItem('teacherApp_profilePic') || "https://via.placeholder.com/50";

let globalPosts = {}; 
let currentFsPostKey = null; 
let allFetchedPosts = []; 
let sortedVideoPosts = [];
let reelsObserver = null;
let showOnlyMyPosts = false; 
let tempProfilePicBase64 = currentProfilePic;
let tempProfileFileObj = null; 
let selectedMedia = { type: null, base64: null, fileObj: null };

// --- 3. Profile UI Updater (புதிதாக சேர்க்கப்பட்டது) ---
function loadUserProfileUI() {
    // LocalStorage லிருந்து லேட்டஸ்ட் டேட்டாவை எடுக்கிறோம்
    currentUserName = localStorage.getItem('teacherApp_userName') || "ஆசிரியர்";
    currentProfilePic = localStorage.getItem('teacherApp_profilePic') || "https://via.placeholder.com/50";
    
    // திரையில் உள்ள படங்களை மாற்றுகிறோம்
    const mainPic = document.getElementById('mainProfilePic');
    if (mainPic) mainPic.src = currentProfilePic;
    
    const sidePic = document.getElementById('sideMenuProfilePic');
    if (sidePic) sidePic.src = currentProfilePic;
    
    const sideName = document.getElementById('sideMenuProfileName');
    if (sideName) sideName.innerText = currentUserName;
}

// --- 4. Menu & UI Toggles ---
function toggleMenu() {
    let menu = document.getElementById('sideMenu');
    let overlay = document.getElementById('menuOverlay');
    if(menu.classList.contains('open')) {
        menu.classList.remove('open');
        overlay.style.display = 'none';
    } else {
        menu.classList.add('open');
        overlay.style.display = 'block';
    }
}

function toggleDrawerSection(elementId) {
    let target = document.getElementById(elementId);
    target.classList.toggle('open');
}

function showToast(message, bgColor = "#28a745") {
    let toast = document.getElementById('custom-toast');
    if(!toast) return;
    toast.innerText = message;
    toast.style.background = bgColor;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.opacity = '1'; }, 10);
    setTimeout(() => { 
        toast.style.opacity = '0'; 
        setTimeout(()=> toast.style.display='none', 500); 
    }, 3000);
}

// --- 5. Profile Management & Editing ---
function openProfileEdit() {
    if(document.getElementById('sideMenu').classList.contains('open')) {
        toggleMenu(); 
    }
    
    document.getElementById('editProfileName').value = localStorage.getItem('teacherApp_userName') || '';
    document.getElementById('editQualification').value = localStorage.getItem('teacherApp_qualification') || '';
    document.getElementById('editSchoolType').value = localStorage.getItem('teacherApp_schoolType') || '';
    document.getElementById('editVillage').value = localStorage.getItem('teacherApp_village') || '';
    document.getElementById('editTaluk').value = localStorage.getItem('teacherApp_taluk') || '';
    document.getElementById('editDistrict').value = localStorage.getItem('teacherApp_district') || '';
    
    tempProfilePicBase64 = localStorage.getItem('teacherApp_profilePic') || 'https://via.placeholder.com/80';
    document.getElementById('profilePicPreview').src = tempProfilePicBase64;

    document.getElementById('profileEditModal').style.display = 'flex';
}

function closeProfileEdit() {
    document.getElementById('profileEditModal').style.display = 'none';
}

function previewProfileImage(event) {
    const file = event.target.files[0];
    if(file) {
        tempProfileFileObj = file; 
        const reader = new FileReader();
        reader.onload = function(e) {
            tempProfilePicBase64 = e.target.result;
            document.getElementById('profilePicPreview').src = tempProfilePicBase64;
        };
        reader.readAsDataURL(file);
    }
}

async function saveProfile() {
    const name = document.getElementById('editProfileName').value.trim() || "ஆசிரியர்";
    const qual = document.getElementById('editQualification').value.trim();
    const school = document.getElementById('editSchoolType').value;
    const village = document.getElementById('editVillage').value.trim();
    const taluk = document.getElementById('editTaluk').value.trim();
    const district = document.getElementById('editDistrict').value.trim();

    const saveBtn = document.querySelector("#profileEditModal button");
    const oldBtnText = saveBtn.innerText;
    saveBtn.innerText = "Saving Profile... ⏳";
    saveBtn.disabled = true;

    try {
        let finalProfilePicUrl = tempProfilePicBase64;

        if (tempProfileFileObj) {
            let userEmail = "guest_user";
            const currentUser = firebase.auth().currentUser;
            if (currentUser && currentUser.email) {
                userEmail = currentUser.email.replace(/[^a-zA-Z0-9]/g, '_'); 
            }
            let r2Folder = `user-profiles/${userEmail}`;
            const uploadedUrl = await uploadFileToR2(tempProfileFileObj, r2Folder);
            
            if (uploadedUrl) {
                finalProfilePicUrl = uploadedUrl;
            } else {
                throw new Error("படம் அப்லோடு செய்வதில் சிக்கல்!");
            }
        }

        localStorage.setItem('teacherApp_userName', name);
        localStorage.setItem('teacherApp_qualification', qual);
        localStorage.setItem('teacherApp_schoolType', school);
        localStorage.setItem('teacherApp_village', village);
        localStorage.setItem('teacherApp_taluk', taluk);
        localStorage.setItem('teacherApp_district', district);
        localStorage.setItem('teacherApp_profilePic', finalProfilePicUrl);

        await database.ref('users/' + currentUserId).set({
            uid: currentUserId,
            name: name,
            qualification: qual,
            schoolType: school,
            village: village,
            taluk: taluk,
            district: district,
            profilePic: finalProfilePicUrl,
            updatedAt: new Date().toISOString()
        });

        showToast("Profile Saved Successfully!");
        loadUserProfileUI(); // UI-ஐ அப்டேட் செய்கிறோம்
        initNetworkAndColleaguesEngine(); 
        closeProfileEdit(); // Modal-ஐ மூடுகிறோம்
        
    } catch (error) {
        console.error(error);
        alert("பிழை: " + error.message);
    } finally {
        saveBtn.innerText = oldBtnText;
        saveBtn.disabled = false;
        tempProfileFileObj = null; 
    }
}

// --- 6. Post Filtering ---
function toggleMyPostsFilter() {
    showOnlyMyPosts = !showOnlyMyPosts;
    const profilePic = document.getElementById('mainProfilePic');
    
    if(showOnlyMyPosts) {
        profilePic.classList.add('filter-active');
        showToast("✅ உங்கள் பதிவுகள் மட்டுமே காட்டப்படுகிறது!");
    } else {
        profilePic.classList.remove('filter-active');
        showToast("🌍 அனைத்து பதிவுகளும் காட்டப்படுகிறது!", "#1a73e8");
    }
    renderFeedToDOM(); 
}

// 1. முதலில் Local Storage-ல் உள்ள பழைய போஸ்ட்களை உடனடியாக காட்டுதல்
function loadCachedPosts() {
    const cachedData = localStorage.getItem('teacherApp_cachedPosts');
    if (cachedData) {
        try {
            allFetchedPosts = JSON.parse(cachedData);
            
            // Global Posts Object-ஐ உருவாக்குதல் (Like/Comment வேலை செய்ய)
            globalPosts = {};
            sortedVideoPosts = [];
            
            allFetchedPosts.forEach(post => {
                globalPosts[post.key] = post;
                if (post.mediaType === 'video' && post.mediaUrl) {
                    post.likeCount = Object.keys(post.likes || {}).length;
                    sortedVideoPosts.push(post);
                }
            });

            sortedVideoPosts.sort((a, b) => b.likeCount - a.likeCount);
            
            setupTopVideo(sortedVideoPosts);
            renderFeedToDOM(); // Cache-ல் உள்ளதை உடனடியாக திரையில் காட்டு
        } catch (e) {
            console.error("Cache loading error:", e);
        }
    } else {
        // முதல் முறை App-ஐ ஓபன் செய்யும் போது (அல்லது Cache இல்லையென்றால்) Loading காட்டுதல்
        const feedContainer = document.querySelector('.feed-container');
        if(feedContainer) {
            feedContainer.innerHTML = `
            <div style="text-align:center; padding:40px; color:#888;">
                <div style="width:40px; height:40px; border:4px solid #f3e8fc; border-top:4px solid #8a2be2; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 10px;"></div>
                <b>போஸ்ட்கள் லோடு ஆகின்றன...</b>
            </div>
            <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>`;
        }
    }
}


// 2. Top Video Setup செய்வதற்கான துணை ஃபங்ஷன்
function setupTopVideo(videos) {
    const topVideoEl = document.getElementById('topClipVideo');
    if (topVideoEl && videos.length > 0) {
        const topVideoUrl = videos[0].mediaUrl;
        if (topVideoEl.src !== topVideoUrl) {
            topVideoEl.src = topVideoUrl;
            topVideoEl.muted = true;
            topVideoEl.play().catch(e => console.log("Auto-play prevented by browser"));
        }
        topVideoEl.style.display = 'block';
    } else if (topVideoEl) {
        topVideoEl.style.display = 'none';
    }
}


// 3. பின்னணியில் Firebase ரியல் டைம் டேட்டாவை எடுத்து அப்டேட் செய்தல்
function initFirebasePostsListener() {
    database.ref('posts').orderByKey().limitToLast(10).on('value', (snapshot) => {
        let activeStates = {};
        document.querySelectorAll('.comment-section').forEach(sec => {
            let id = sec.id.split('comment-section-')[1];
            let input = document.getElementById(`comment-input-${id}`);
            if(sec.style.display === 'block') { activeStates[id] = input ? input.value : ''; }
        });

        let freshPosts = [];
        globalPosts = {};
        sortedVideoPosts = [];

        snapshot.forEach((childSnapshot) => {
            let postData = { key: childSnapshot.key, ...childSnapshot.val() };
            freshPosts.push(postData);
            globalPosts[childSnapshot.key] = postData; 
            
            if (postData.mediaType === 'video' && postData.mediaUrl) {
                postData.likeCount = Object.keys(postData.likes || {}).length;
                sortedVideoPosts.push(postData);
            }
        });

        allFetchedPosts = freshPosts;
        sortedVideoPosts.sort((a, b) => b.likeCount - a.likeCount);
        
        // --- புதிய அதிவேக Caching லாஜிக் தொடக்கம் ---
        let topVideoToCache = null;
        if (sortedVideoPosts.length > 0) {
            topVideoToCache = sortedVideoPosts[0]; 
        }

        const textOnlyPosts = freshPosts.map(post => {
            return {
                ...post,
                mediaType: null,
                mediaUrl: null   
            };
        });

        const cacheObject = {
            topVideo: topVideoToCache,
            feedPosts: textOnlyPosts
        };

        // பிழை சரிசெய்யப்பட்ட Try-Catch பகுதி
        try {
            localStorage.setItem('teacherApp_cachedPosts', JSON.stringify(cacheObject));
        } catch (e) {
            console.warn("Local Storage நிறைந்துவிட்டது (Quota Exceeded). பழைய cache அழிக்கப்படுகிறது...");
            localStorage.clear(); 
            try {
                localStorage.setItem('teacherApp_cachedPosts', JSON.stringify(cacheObject));
            } catch (e2) {
                console.error("Cache-ஐ சேமிக்க முடியவில்லை:", e2);
            }
        }
        // --- புதிய அதிவேக Caching லாஜிக் முடிவு ---
             setupTopVideo(sortedVideoPosts);
        renderFeedToDOM(activeStates); 
        
        if (document.getElementById('fsModal').style.display === 'flex' && currentFsPostKey && globalPosts[currentFsPostKey]) {
            updateFullScreenUI(globalPosts[currentFsPostKey]);
        }
        
        // --- புதிய கோடு: URL மூலம் தானாக ஸ்க்ரோல் செய்தல் ---
        const urlParams = new URLSearchParams(window.location.search);
        const viewTarget = urlParams.get('view');
        
        if (viewTarget === 'top' && !window.hasAutoScrolled) {
            const topClipSection = document.getElementById('topClipCard');
            if (topClipSection) {
                setTimeout(() => {
                    topClipSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    window.hasAutoScrolled = true;
                }, 500);
            }
        } else if (viewTarget === 'new' && !window.hasAutoScrolled) {
            const firstPost = document.querySelector('.feed-container .post-card');
            if (firstPost) {
                setTimeout(() => {
                    firstPost.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    window.hasAutoScrolled = true;
                }, 500);
            }
        }
    });
}
  
  
// 4. ஃபங்ஷன்களை இயக்குதல்

function renderFeedToDOM(activeStates = {}) {
    const feedContainer = document.querySelector('.feed-container');
    feedContainer.innerHTML = ''; 
    let displayArray = [...allFetchedPosts].reverse(); 

    if (showOnlyMyPosts) {
        displayArray = displayArray.filter(post => post.userName === currentUserName);
        if(displayArray.length === 0) {
            feedContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#666;"><i class="bi bi-journal-x" style="font-size:40px; color:#ccc;"></i><br><br><b>நீங்கள் இன்னும் எந்தப் பதிவும் செய்யவில்லை!</b></div>';
            return;
        }
    }

    displayArray.forEach((post) => {
        const postKey = post.key;
        let mediaHTML = '';
        if(post.mediaUrl) {
            if(post.mediaType === 'image') {
                // படங்களுக்கு பழைய Fullscreen முறை அப்படியே இருக்கும்
                mediaHTML = `<div class="post-image" onclick="openFullScreen('${postKey}')"><img src="${post.mediaUrl}" loading="lazy"></div>`;
                
            } else if(post.mediaType === 'video') {
                // வீடியோவை கிளிக் செய்யும் போது Custom Full Screen-ல் (fsModal) திறக்க மாற்றம் செய்யப்பட்டுள்ளது
                mediaHTML = `<div class="post-video" onclick="openFullScreen('${postKey}')">
                                <video src="${post.mediaUrl}" class="feed-video" autoplay muted loop playsinline preload="metadata" style="width:100%; cursor:pointer; pointer-events:none;"></video>
                             </div>`;
                             
            } else if(post.mediaType === 'audio') {
                // ஆடியோவிற்கு எந்த மாற்றமும் இல்லை
                mediaHTML = `<div class="post-audio"><audio src="${post.mediaUrl}" controls style="width:100%;"></audio></div>`;
            }
        }
        
        
        const likes = post.likes || {};
        const likeCount = Object.keys(likes).length;
        const heartIcon = likes[currentUserId] ? '<i class="bi bi-heart-fill" style="color: #e42645;"></i>' : '<i class="bi bi-heart" style="color: #e42645;"></i>';
        const likeText = likeCount > 0 ? `Inspire (${likeCount})` : 'Inspire';
        let commentsHTML = generateCommentsHTML(postKey, post.comments);
        
        const postHTML = `
            <div class="post-card" id="post-${postKey}">
                <div class="post-header">
                    <div class="post-user-info">
                        <img src="${post.userImage || 'https://via.placeholder.com/50'}" loading="lazy">
                        <div><h4>${post.userName}</h4><p>${post.time || 'Just now'} • <i class="bi bi-globe"></i></p></div>
                    </div>
                </div>
                <div class="post-content">${post.content}</div>
                ${mediaHTML}
                <div class="post-actions">
                    <div class="action-btn" onclick="toggleLike('${postKey}')">${heartIcon} <span>${likeText}</span></div>
                    <div class="action-btn" onclick="toggleCommentSection('${postKey}')">
                     <i class="bi bi-chat-text-fill" style="color: #17a2b8;"></i> 
                      Review (<span id="comment-count-${postKey}">${Object.keys(post.comments || {}).length}</span>)
                    </div>
                    <div class="action-btn" onclick="sharePost('${postKey}', 'Staff Room Post')"><i class="bi bi-share-fill" style="color: #28a745;"></i> Spread</div>
                </div>
                <div class="comment-section" id="comment-section-${postKey}">
                    <div class="comment-list" id="comment-list-${postKey}">${commentsHTML || '<p style="text-align:center;">No reviews yet.</p>'}</div>
                    <div class="comment-input-area"><input type="text" id="comment-input-${postKey}" placeholder="Write a review..."><button onclick="submitComment('${postKey}')"><i class="bi bi-send-fill"></i></button></div>
                </div>
            </div>
        `;
        feedContainer.insertAdjacentHTML('beforeend', postHTML);
    });

    Object.keys(activeStates).forEach(id => {
        let sec = document.getElementById(`comment-section-${id}`);
        let input = document.getElementById(`comment-input-${id}`);
        if(sec) sec.style.display = 'block';
        if(input) { input.value = activeStates[id]; input.focus(); }
    });
}

// --- 8. Create Post & Upload Logic ---
function updateFileStatus(type) {
    const inputMap = { 'image': 'imageInput', 'video': 'videoInput', 'audio': 'audioInput' };
    const file = document.getElementById(inputMap[type]).files[0];
    const statusDiv = document.getElementById('fileStatusMessage');
    
    if (file) {
        statusDiv.innerText = `📎 Selected ${type}: ${file.name}`;
        selectedMedia.type = type;
        selectedMedia.fileObj = file;

        const reader = new FileReader();
        reader.onload = function(e) {
            selectedMedia.base64 = e.target.result;
        };
        reader.readAsDataURL(file);
    }
}

function closeModal() {
    document.getElementById('postModal').style.display = 'none';
    document.getElementById('postText').value = '';
    document.getElementById('imageInput').value = '';
    document.getElementById('videoInput').value = '';
    document.getElementById('audioInput').value = '';
    document.getElementById('fileStatusMessage').innerText = '';
    selectedMedia = { type: null, base64: null, fileObj: null }; 
}

async function createPost() {
    let text = document.getElementById('postText').value;
    
    if(text.trim() === "" && !selectedMedia.fileObj) {
        return alert("தயவுசெய்து ஏதேனும் எழுதவும் அல்லது கோப்பை இணைக்கவும்!");
    }

    const postBtn = document.querySelector("button[onclick='createPost()']");
    const originalBtnText = postBtn.innerText;
    postBtn.innerText = "Uploading... Please wait ⏳";
    postBtn.disabled = true;
    postBtn.style.opacity = "0.7";

    try {
        let finalMediaUrl = null;

        if (selectedMedia.fileObj) {
            finalMediaUrl = await uploadFileToR2(selectedMedia.fileObj, "user-uploads");
            if (!finalMediaUrl) throw new Error("Cloudflare R2-விற்கு அப்லோடு செய்வதில் சிக்கல்!");
        }

        const newPostKey = database.ref().child('posts').push().key;

        const postData = {
            userName: currentUserName, 
            content: text,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            userImage: currentProfilePic, 
            mediaType: selectedMedia.type || null,
            mediaUrl: finalMediaUrl 
        };

        await database.ref('posts/' + newPostKey).set(postData);
        closeModal();
    } catch (error) {
        console.error(error);
        alert("போஸ்ட் செய்வதில் பிழை: " + error.message);
    } finally {
        postBtn.innerText = originalBtnText;
        postBtn.disabled = false;
        postBtn.style.opacity = "1";
    }
}

async function uploadFileToR2(file, folderName = "user-uploads") {
    try {
        // ஃபைல் பெயரில் ஸ்பேஸ் இருந்தால் அதை நீக்க ஒரு பாதுகாப்பு சேர்க்கப்பட்டுள்ளது
        const safeFileName = file.name.replace(/\s+/g, '-');
        
        const response = await fetch("/.netlify/functions/get-upload-url", {
            method: "POST",
            // "posts" என்பதற்குப் பதிலாக folderName என மாற்றப்பட்டுள்ளது
            body: JSON.stringify({ fileName: safeFileName, fileType: file.type, folder: folderName })
        });


// பிழை எதனால் வந்தது என்பதைத் துல்லியமாகக் கண்டுபிடிக்க புதிய குறியீடு
if (!response.ok) {
    const errorDetails = await response.text();
    console.error("Netlify Backend Error:", errorDetails);
    alert("Backend Error: " + response.status + " - " + errorDetails); // திரையிலேயே காரணத்தைக் காட்டும்
    throw new Error("Failed to get upload URL. Status: " + response.status);
}

        const data = await response.json();
        const { uploadUrl, fileKey } = data;

        const uploadResponse = await fetch(uploadUrl, {
            method: "PUT",
            headers: { "Content-Type": file.type },
            body: file
        });

        if (uploadResponse.ok) {
            return `https://pub-52b2110c34374c8497787aaee097c4c3.r2.dev/${fileKey}`; 
        } else {
            throw new Error("R2-விற்கு அப்லோடு செய்வதில் பிழை!");
        }

    } catch (error) {
        console.error("Error uploading file:", error);
        return null;
    }
}

// --- 9. Interactions (Likes & Comments) ---
function toggleLike(postId) {
    const postRef = database.ref(`posts/${postId}/likes/${currentUserId}`);
    postRef.once('value').then(snapshot => {
        if (snapshot.exists()) postRef.remove(); 
        else postRef.set(true); 
    });
}

function toggleCommentSection(postId) {
    const section = document.getElementById(`comment-section-${postId}`);
    section.style.display = (section.style.display === 'block') ? 'none' : 'block';
}

function generateCommentsHTML(postId, comments) {
    if (!comments) return '<p style="text-align:center;">No reviews yet.</p>';
    
    let html = '';
    const allKeys = Object.keys(comments);
    const parents = allKeys.filter(k => !comments[k].replyTo);
    const children = allKeys.filter(k => comments[k].replyTo);

    parents.forEach(pKey => {
        html += renderSingleComment(postId, pKey, comments[pKey], false, pKey);
        const replies = children.filter(cKey => comments[cKey].replyTo === pKey);
        if (replies.length > 0) {
            html += `<div class="sub-comments-list">`;
            replies.forEach(cKey => {
                html += renderSingleComment(postId, cKey, comments[cKey], true, pKey);
            });
            html += `</div>`;
        }
    });
    return html || '<p style="text-align:center;">No reviews yet.</p>';
}

function renderSingleComment(postId, commentId, c, isReply, parentId) {
    let inspireCount = c.likes ? Object.keys(c.likes).length : 0;
    let isLiked = c.likes && c.likes[currentUserId] ? true : false;
    let heartColor = isLiked ? '#e42645' : '#888';
    let heartIcon = isLiked ? 'bi-heart-fill' : 'bi-heart';

    return `
        <div class="comment-item" id="comment-${commentId}">
            <strong>${c.userName}</strong>: ${c.text}
            <div style="display:flex; gap:15px; font-size:12px; margin-top:5px; color:#555;">
                <span class="comment-action-btn" onclick="inspireComment('${postId}', '${commentId}')" style="color:${heartColor};">
                    <i class="bi ${heartIcon}"></i> Inspire ${inspireCount > 0 ? `(${inspireCount})` : ''}
                </span>
                <span class="comment-action-btn" onclick="setReply('${postId}', '${c.userName}', '${parentId}')" style="color:#8a2be2;">
                    <i class="bi bi-reply-fill"></i> Interact
                </span>
            </div>
        </div>
    `;
}

function inspireComment(postId, commentId) {
    const likeRef = database.ref(`posts/${postId}/comments/${commentId}/likes/${currentUserId}`);
    likeRef.once('value').then(snap => {
        if(snap.exists()) likeRef.remove(); 
        else likeRef.set(true); 
    });
}

function setReply(postId, userName, targetReplyId) {
    let input = document.getElementById(`comment-input-${postId}`);
    if (document.getElementById('fsModal').style.display === 'flex' && postId === currentFsPostKey) {
        input = document.getElementById('fsCommentInput');
    }
    if (input) {
        input.value = `@${userName} `; 
        input.setAttribute('data-reply-to', targetReplyId); 
        input.focus(); 
    }
}

function submitComment(postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const text = input.value.trim();
    const replyTo = input.getAttribute('data-reply-to');
    
    if(!text) return;

    const commentData = {
        userId: currentUserId,
        userName: currentUserName,
        text: text,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    };
    if (replyTo) commentData.replyTo = replyTo; 

    database.ref(`posts/${postId}/comments`).push(commentData).then(() => {
        input.value = '';
        input.removeAttribute('data-reply-to');
    });
}

function sharePost(postId, text) {
    if (navigator.share) {
        navigator.share({
            title: 'Staff Room Post',
            text: text,
            url: window.location.href 
        }).catch((e) => console.log('Error sharing', e));
    } else {
        navigator.clipboard.writeText(text + '\n' + window.location.href);
        alert("லிங்க் காப்பி செய்யப்பட்டது!");
    }
}

// --- 10. Top Clips & Reels ---
function openTopClipsModal() {
    if (sortedVideoPosts.length === 0) return alert("வீடியோக்கள் எதுவும் இல்லை!");
    const container = document.getElementById('topClipsContainer');
    container.innerHTML = ''; 

    sortedVideoPosts.forEach(post => {
        const likes = post.likes || {};
        const likeCount = Object.keys(likes).length;
        const isLiked = likes[currentUserId] ? true : false;
        const heartClass = isLiked ? 'bi-heart-fill' : 'bi-heart';
        const heartColor = isLiked ? '#e42645' : 'white';
        const commentCount = Object.keys(post.comments || {}).length;

        const reelHTML = `
            <div class="reel-item">
                <div class="reel-header">
                    <img src="${post.userImage || 'https://via.placeholder.com/50'}">
                    <span>${post.userName}</span>
                </div>
                <video src="${post.mediaUrl}" class="reel-video" data-postkey="${post.key}" loop playsinline></video>
                <div class="reel-content-text">${post.content || ''}</div>
                <div class="reel-actions">
                    <div class="reel-action-btn" onclick="reelToggleLike('${post.key}', this)">
                        <i class="bi ${heartClass}" style="color:${heartColor};"></i>
                        <span class="rcount">${likeCount > 0 ? likeCount : ''}</span>
                    </div>
                    <div class="reel-action-btn" onclick="openReelComments('${post.key}')">
                        <i class="bi bi-chat-text-fill"></i>
                        <span>${commentCount > 0 ? commentCount : ''}</span>
                    </div>
                    <div class="reel-action-btn" onclick="sharePost('${post.key}', 'Check out this video on Staff Room!')">
                        <i class="bi bi-share-fill"></i>
                        <span>Spread</span>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', reelHTML);
    });

    document.getElementById('topClipsModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';

    if (reelsObserver) reelsObserver.disconnect();
    
    reelsObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const vid = entry.target;
            if (entry.isIntersecting) {
                vid.muted = false; 
                vid.play().catch(e=>console.log(e));
                currentFsPostKey = vid.getAttribute('data-postkey'); 
            } else {
                vid.pause();
                vid.currentTime = 0; 
            }
        });
    }, { threshold: 0.6 });

    document.querySelectorAll('.reel-video').forEach(vid => { reelsObserver.observe(vid); });
}

function closeTopClipsModal() {
    document.getElementById('topClipsModal').style.display = 'none';
    document.body.style.overflow = 'auto';
    if (reelsObserver) reelsObserver.disconnect();
    document.querySelectorAll('.reel-video').forEach(vid => { vid.pause(); });
    currentFsPostKey = null;
    document.getElementById('fsCommentOverlay').classList.remove('show');
}

function reelToggleLike(postKey, element) {
    toggleLike(postKey); 
    const icon = element.querySelector('i');
    const countSpan = element.querySelector('.rcount');
    let currentCount = parseInt(countSpan.innerText) || 0;
    
    if (icon.classList.contains('bi-heart')) {
        icon.classList.replace('bi-heart', 'bi-heart-fill');
        icon.style.color = '#e42645';
        countSpan.innerText = currentCount + 1;
    } else {
        icon.classList.replace('bi-heart-fill', 'bi-heart');
        icon.style.color = 'white';
        countSpan.innerText = currentCount > 0 ? currentCount - 1 : '';
    }
}

function openReelComments(postKey) {
    currentFsPostKey = postKey;
    const post = globalPosts[postKey];
    updateFullScreenUI(post); 
    document.getElementById('fsCommentOverlay').classList.add('show');
}

function toggleSeeMore() {
    const wrapper = document.getElementById('seeMoreWrapper');
    const textEl = document.getElementById('seeMoreText');

        wrapper.classList.remove('show');
        textEl.innerHTML = 'See More <i class="bi bi-chevron-down"></i>';

function initNetworkAndColleaguesEngine() {
    const myVillage = (localStorage.getItem('teacherApp_village') || '').trim().toLowerCase();
    const myTaluk = (localStorage.getItem('teacherApp_taluk') || '').trim().toLowerCase();
    const myDistrict = (localStorage.getItem('teacherApp_district') || '').trim().toLowerCase();

    database.ref('users').limitToLast(25).once('value', (usersSnapshot) => {
        const allUsers = [];
        usersSnapshot.forEach((child) => {
            if(child.key !== currentUserId) {
                allUsers.push({ uid: child.key, ...child.val() });
            }
        });

        database.ref(`connections/${currentUserId}`).on('value', (connSnapshot) => {
            const connectedIds = [];
            connSnapshot.forEach((c) => { connectedIds.push(c.key); });
            document.getElementById('sidebarConnectsCount').innerText = connectedIds.length;

            database.ref(`invites/${currentUserId}`).on('value', (inviteSnapshot) => {
                const incomingInviteIds = [];
                inviteSnapshot.forEach((i) => { incomingInviteIds.push(i.key); });
                document.getElementById('sidebarInvitesCount').innerText = incomingInviteIds.length;

                renderColleaguesGridAndHorizontalBox(allUsers, connectedIds, incomingInviteIds, myVillage, myTaluk, myDistrict);
                renderDrawerVerticalLists(allUsers, connectedIds, incomingInviteIds);
            });
        });
    });
}

function renderColleaguesGridAndHorizontalBox(allUsers, connectedIds, incomingInviteIds, myVillage, myTaluk, myDistrict) {
    const gridContainer = document.getElementById('colleaguesGrid');
    const horizontalContainer = document.getElementById('suggestedHorizontalBox');
    
    if(!gridContainer || !horizontalContainer) return;

    gridContainer.innerHTML = '';
    horizontalContainer.innerHTML = '';

    let colleagueMatches = [];
    
    // பயனரின் ஊர் விபரங்கள் காலியாக உள்ளதா என சரிபார்த்தல்
    if (!myVillage && !myTaluk && !myDistrict) {
        colleagueMatches = allUsers; // காலியாக இருந்தால் அனைவரையும் காட்டு
    } else {
        // ஊர் விபரம் இருந்தால், அதை வைத்து ஃபில்டர் செய்
        colleagueMatches = allUsers.filter(user => {
            const uVillage = (user.village || '').trim().toLowerCase();
            const uTaluk = (user.taluk || '').trim().toLowerCase();
            const uDistrict = (user.district || '').trim().toLowerCase();
            return (myVillage && uVillage === myVillage) || 
                   (myTaluk && uTaluk === myTaluk) || 
                   (myDistrict && uDistrict === myDistrict);
        });
        
        // ஒருவேளை அந்த ஊரில் யாரும் இல்லை என்றாலும், காலியாக காட்டாமல் அனைவரையும் காட்ட
        if (colleagueMatches.length === 0) {
            colleagueMatches = allUsers;
        }
    }

    const gridDisplayList = colleagueMatches.slice(0, 4);

    if(gridDisplayList.length === 0) {
        gridContainer.innerHTML = '<p style="grid-column: span 2; text-align:center; font-size:12px; color:gray; padding:10px;">No regional colleagues found yet.</p>';
    } else {
        gridDisplayList.forEach(user => {
            let avatarHTML = (user.profilePic && user.profilePic.trim() !== '') ? `<img src="${user.profilePic}" class="colleague-avatar">` : `<div class="colleague-fallback">user</div>`;
            let locText = user.village || user.taluk || user.district || 'Tamil Nadu';
            let itemHTML = `
                <div class="colleague-item">
                    ${avatarHTML}
                    <div class="colleague-info">
                        <div class="colleague-name">${user.name || 'ஆசிரியர்'}</div>
                        <div class="colleague-loc">${locText}</div>
                    </div>
                </div>`;
            gridContainer.insertAdjacentHTML('beforeend', itemHTML);
        });
    }

    let suggestedProfiles = allUsers.filter(user => !connectedIds.includes(user.uid) && !incomingInviteIds.includes(user.uid));

    if(suggestedProfiles.length === 0) {
        horizontalContainer.innerHTML = '<p style="font-size:12px; color:gray; padding:10px; width:100%; text-align:center;">No new suggestions available.</p>';
    } else {
        suggestedProfiles.forEach(user => {
            let picUrl = (user.profilePic && user.profilePic.trim() !== '') ? user.profilePic : 'https://via.placeholder.com/50';
            let cardHTML = `
                <div class="suggest-profile-card">
                    <div class="connect-plus-btn" onclick="sendConnectRequest('${user.uid}')"><i class="bi bi-plus"></i></div>
                    <img src="${picUrl}" class="suggest-avatar">
                    <div class="suggest-name">${user.name || 'User'}</div>
                </div>`;
            horizontalContainer.insertAdjacentHTML('beforeend', cardHTML);
        });
    }
}

function renderDrawerVerticalLists(allUsers, connectedIds, incomingInviteIds) {
    const connectsContainer = document.getElementById('drawerConnectsList');
    const invitesContainer = document.getElementById('drawerInvitesList');
    
    if(!connectsContainer || !invitesContainer) return;

    connectsContainer.innerHTML = '';
    invitesContainer.innerHTML = '';

    const connectedUsers = allUsers.filter(u => connectedIds.includes(u.uid));
    if(connectedUsers.length === 0) {
        connectsContainer.innerHTML = '<span style="font-size:11px; color:gray; text-align:center; padding:5px 0;">No active connects.</span>';
    } else {
        connectedUsers.forEach(user => {
            let imgUrl = (user.profilePic && user.profilePic.trim() !== '') ? user.profilePic : 'https://via.placeholder.com/50';
            let rowHTML = `
                <div class="vertical-user-line">
                    <div class="v-user-left">
                        <img src="${imgUrl}" class="v-avatar">
                        <span class="v-name">${user.name || 'User'}</span>
                    </div>
                </div>`;
            connectsContainer.insertAdjacentHTML('beforeend', rowHTML);
        });
    }

    const invitingUsers = allUsers.filter(u => incomingInviteIds.includes(u.uid));
    if(invitingUsers.length === 0) {
        invitesContainer.innerHTML = '<span style="font-size:11px; color:gray; text-align:center; padding:5px 0;">No pending invites.</span>';
    } else {
        invitingUsers.forEach(user => {
            let imgUrl = (user.profilePic && user.profilePic.trim() !== '') ? user.profilePic : 'https://via.placeholder.com/50';
            let rowHTML = `
                <div class="vertical-user-line">
                    <div class="v-user-left">
                        <img src="${imgUrl}" class="v-avatar">
                        <span class="v-name">${user.name || 'User'}</span>
                    </div>
                    <div class="v-actions">
                        <button class="btn-join-now" onclick="acceptInvite('${user.uid}')">Join Now</button>
                        <button class="btn-no-delete" onclick="rejectInvite('${user.uid}')">No</button>
                    </div>
                </div>`;
            invitesContainer.insertAdjacentHTML('beforeend', rowHTML);
        });
    }
}

function sendConnectRequest(targetUserId) {
    database.ref(`invites/${targetUserId}/${currentUserId}`).set(true)
    .then(() => showToast("Connect request transmitted successfully!"))
    .catch(() => alert("Transmission failed."));
}

function acceptInvite(senderId) {
    database.ref(`connections/${currentUserId}/${senderId}`).set(true).then(() => {
        database.ref(`connections/${senderId}/${currentUserId}`).set(true).then(() => {
            database.ref(`invites/${currentUserId}/${senderId}`).remove().then(() => {
                showToast("Connected successfully!");
            });
        });
    });
}

function rejectInvite(senderId) {
    database.ref(`invites/${currentUserId}/${senderId}`).remove().then(() => {
        showToast("Invite declined & removed.");
    });
}

// --- 12. Full Screen Image/Video View ---
function openFullScreen(postKey) {
    currentFsPostKey = postKey;
    const post = globalPosts[postKey];
    if(!post) return;

    document.getElementById('fsModal').style.display = 'flex';
    document.body.style.overflow = 'hidden'; 
    document.getElementById('fsUserName').innerText = post.userName;
    document.getElementById('fsUserProfilePic').src = (post.userImage && post.userImage.trim() !== '') ? post.userImage : 'https://via.placeholder.com/50';

    const mediaContainer = document.getElementById('fsMediaContainer');
    if(post.mediaType === 'image') {
        mediaContainer.innerHTML = `<img src="${post.mediaUrl}">`;
    } else if(post.mediaType === 'video') {
        // Full screen-ல் வீடியோ சீராக பிளே ஆக தேவையான Attributes சேர்க்கப்பட்டுள்ளது
        mediaContainer.innerHTML = `<video src="${post.mediaUrl}" controls autoplay playsinline preload="auto" style="width:100%; max-height:100vh; background:#000;"></video>`;
        
        // வீடியோ லோட் ஆனதும் தானாக பிளே ஆக
        setTimeout(() => {
            const fsVideo = mediaContainer.querySelector('video');
            if(fsVideo) {
                fsVideo.muted = false; // ஆடியோ ஆன் செய்ய
                fsVideo.play().catch(e => console.log("Click to play needed", e));
            }
        }, 100);
    }
    updateFullScreenUI(post);
}

function closeFullScreen() {
    document.getElementById('fsModal').style.display = 'none';
    document.body.style.overflow = 'auto'; 
    document.getElementById('fsMediaContainer').innerHTML = ''; 
    document.getElementById('fsCommentOverlay').classList.remove('show');
    currentFsPostKey = null;
}

function updateFullScreenUI(post) {
    const likes = post.likes || {};
    const likeCount = Object.keys(likes).length;
    const isLiked = likes[currentUserId] ? true : false;
    
    const iconEl = document.getElementById('fsInspireIcon');
    iconEl.className = isLiked ? "bi bi-heart-fill" : "bi bi-heart";
    iconEl.style.color = isLiked ? "#e42645" : "white";
    document.getElementById('fsInspireCount').innerText = likeCount > 0 ? likeCount : "Inspire";

    const comments = post.comments || {};
    const cKeys = Object.keys(comments);
    document.getElementById('fsCommentCountText').innerText = cKeys.length;
    document.getElementById('fsCommentList').innerHTML = generateCommentsHTML(currentFsPostKey, post.comments);
}

function toggleFsComments() { document.getElementById('fsCommentOverlay').classList.toggle('show'); }
function closeFsCommentsIfOpen() { document.getElementById('fsCommentOverlay').classList.remove('show'); }
function fsToggleLike() { if(currentFsPostKey) toggleLike(currentFsPostKey); }
function fsSharePost() {
    if(!currentFsPostKey) return;
    const post = globalPosts[currentFsPostKey];
    sharePost(currentFsPostKey, post.content || "Staff Room Post");
}
function submitFsComment() {
    if(!currentFsPostKey) return;
    const input = document.getElementById('fsCommentInput');
    const text = input.value.trim();
    const replyTo = input.getAttribute('data-reply-to');

    if(!text) return;

    const commentData = {
        userId: currentUserId, 
        userName: currentUserName, 
        text: text,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    };
    if (replyTo) commentData.replyTo = replyTo;

    database.ref(`posts/${currentFsPostKey}/comments`).push(commentData).then(() => {
        input.value = ''; 
        input.removeAttribute('data-reply-to');
        setTimeout(() => {
            let listEl = document.getElementById('fsCommentList');
            listEl.scrollTop = listEl.scrollHeight; 
        }, 300);
    });
}

function logoutUser() {
    firebase.auth().signOut().then(() => {
        localStorage.clear(); 
        window.location.replace("index.html"); 
    }).catch((error) => {
        console.error("Logout பிழை: ", error);
        alert("Logout செய்வதில் பிழை ஏற்பட்டது!");
    });
}

// --- 8. Video Post Fullscreen & Audio Engine ---

// --- 8. Video Post Fullscreen & Audio Engine (All Device Compatible) ---

// வீடியோவைக் கிளிக் செய்யும்போது ஆடியோவுடன் ஃபுல் ஸ்கிரீனில் இயக்கும் ஃபங்ஷன்
function openVideoFullScreen(videoElement, event) {
    // 1. மற்ற கிளிக்குகளுடன் முரண்படுவதைத் தவிர்க்க (Event Bubbling Prevention)
    if (event) event.stopPropagation();
    
    // 2. ஆடியோவை ஆன் செய்தல் (Unmute)
    videoElement.muted = false;
    
    // 3. வீடியோ பிளே ஆவதை உறுதி செய்தல்
    videoElement.play().catch(e => console.log("Playback interaction error:", e));

    // 4. பிரவுசர் மற்றும் மொபைல் வகைக்கு தகுந்தபடி ஃபுல் ஸ்கிரீன் மோடுக்கு மாற்றுதல்
    if (videoElement.requestFullscreen) {
        // Android, Chrome, Windows, Mac பிரவுசர்களுக்கானது
        videoElement.requestFullscreen();
    } else if (videoElement.webkitEnterFullscreen) { 
        // 🔴 இது iPhone / iOS Safari சாதனங்களுக்கான மிக முக்கியமான கோடு
        videoElement.webkitEnterFullscreen();
    } else if (videoElement.webkitRequestFullscreen) { 
        // iPad மற்றும் பழைய Safari-க்கான கோடு
        videoElement.webkitRequestFullscreen();
    } else if (videoElement.msRequestFullscreen) { 
        // பழைய Edge / IE-க்கான கோடு
        videoElement.msRequestFullscreen();
    }
}

// பயனர் ஃபுல் ஸ்கிரீனை விட்டு வெளியேறும்போது, வீடியோ மீண்டும் தானாகவே மியூட் ஆக (விருப்பப்பட்டால் பயன்படுத்தலாம்)
document.addEventListener('fullscreenchange', function() {
    // பயனர் ஃபுல் ஸ்கிரீனை மூடிவிட்டால் (Exit Fullscreen)
    if (!document.fullscreenElement) {
        // ஃபீடில் உள்ள போஸ்ட் வீடியோக்களை மட்டும் மீண்டும் மியூட் செய்ய
        const allFeedVideos = document.querySelectorAll('.feed-container video');
        allFeedVideos.forEach(vid => {
            // டாப் கிளிப் வீடியோவைத் தவிர மற்ற வீடியோக்களை மியூட் செய்கிறோம்
            if (vid.id !== 'topClipVideo') {
                vid.muted = true;
            }
        });
    }
});
